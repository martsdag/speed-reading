<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/public/book-logo.png">
    <link
      rel="stylesheet"
      type="text/css"
      href="src/styles.css"
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    >
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prosto+One&display=swap" rel="stylesheet">
    <title>Speed reading</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  </head>

  <body>
    <header class="header">
      <div class="header__container _container">
        <img
          src="/public/book-logo.png"
          width="30"
          height="30"
          alt="book"
        >
        <span data-i18n="speedReadingTitle" class="header__title"></span>
        <div class="header__language-selector">
          <select
            class="language-selector"
            id="language-selector"
            onchange="onChangeSelectLanguage()"
          >
            <option
              data-i18n="selectLanguage"
              disabled
              value="select-language"
            >
            </option>
            <option value="en">English(EN)</option>
            <option value="es">Español(ES)</option>
            <option value="ru">Русский(RU)</option>
          </select>
        </div>
      </div>
    </header>
    <main class="layout _container">
      <div class="file-upload">
        <div class="file-upload__description">
          <p data-i18n="selectFileToDownload"></p>
          <label class="file-upload__label" for="file-upload-input">
            <input
              id="file-upload-input"
              type="file"
              accept=".pdf"
              onchange="onChangeUploadedFile(event)"
            >
          </label>
        </div>
        <div class="speed-reading">
          <div class="speed-reading__range">
            <label
              data-i18n="speedReading"
              class="speed-reading__label"
              for="speed-reading-range"
            >
            </label>
            <input
              type="range"
              id="speed-reading-range-input"
              min="100"
              max="500"
              value="100"
              step="20"
              oninput="onInputChangeSpeedReading()"
            >
            <div class="speed-reading__range-output">
              <output
                role="status"
                for="speed-reading-range"
                class="speed-reading__output"
                id="speed-reading-range-output"
              >
              </output>
              <p data-i18n="wordsPerMinute" class="speed-reading__description"></p>
            </div>
          </div>
          <div class="speed-reading__controls"></div>
          <button
            data-i18n="startReading"
            id="start-reading-button"
            class="button"
            onclick="onClickStartSpeedReading()"
          >
          </button>
          <button
            data-i18n="stopReading"
            id="stop-reading-button"
            class="button"
            onclick="onClickStopSpeedReading()"
          >
          </button>
        </div>
      </div>
      <div id="pdf-text-element" class="pdf-text__element">
        <span class="pdf-text__word-part" id="word-part-start"></span>
        <span class="pdf-text__word-part" id="word-part-middle"></span>
        <span class="pdf-text__word-part" id="word-part-end"></span>
      </div>
      <div class="switch-page">
        <button
          data-i18n="previousPage"
          id="previous-page-button"
          class="button"
          disabled
          onclick="onClickButtonPrev()"
        >
        </button>
        <button
          data-i18n="nextPage"
          id="next-page-button"
          class="button"
          disabled
          onclick="onClickButtonNext()"
        >
        </button>
      </div>
    </main>
    <footer class="footer">
      <div class="footer__container _container"></div>
    </footer>
    <script src="src/index.js"></script>
  </body>
</html>
