<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="src/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prosto+One&display=swap" rel="stylesheet">
    <title>Speed reading</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  </head>
  <body>
    <div>
      <header class="header">
        <div class="header__container">
          <div class="header__logo">
            <img src="/public/book-logo.png" width="30" height="30" alt="book">
          </div>
          <span class="header__title">Speed reading</span>
        </div>
      </header>
      <div class="file-upload">
        <label class="file-upload__label">Выберите файл для загрузки:</label>
        <input class="file-upload__input" type="file" accept=".pdf" name="uploaded-file">
        <button id="send-button" class="button" onclick="sendFile()">Отправить</button>
      </div>
      <div id="pdf-text"></div>
      <div class="switch-page">
      <button id="previous-page-button" class="button" disabled onclick="getToPreviousPage()">Предыдущая страница</button>
      <button id="next-page-button" class="button" disabled onclick="getToNextPage()">Следующая страница</button>
      </div>
      <footer class="footer">
        Footer
        <div class="footer__container"></div>
      </footer>
      </div>
      <script src="src/index.js"></script>
  </body>
</html>
